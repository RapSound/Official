<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapSound | Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>
    <style>
        :root { --primary: #ff1a1a; --primary-glow: rgba(255, 26, 26, 0.6); --bg: #020000; }
        
        body { margin: 0; font-family: 'Montserrat', sans-serif; color: #fff; background-color: var(--bg); overflow-x: hidden; }

        /* FOND OPTIMISÉ GPU */
        .bg-layer {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(45deg, #020000, #2a0000, #020000);
            background-size: 400% 400%; animation: grad 12s ease infinite;
            will-change: transform;
        }
        @keyframes grad { 0%, 100% { background-position: 0% 50% } 50% { background-position: 100% 50% } }
        #particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* NAV */
        nav { 
            display: flex; justify-content: center; gap: 8px; padding: 10px; position: sticky; top: 0; 
            z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--primary); flex-wrap: wrap;
        }
        nav button { 
            background: none; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1rem; transition: 0.3s; 
        }
        nav button.active-btn { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); border-color: var(--primary); }

        /* SECTIONS */
        section { display: none; padding: 40px 15px; text-align: center; max-width: 850px; margin: auto; }
        section.active { display: block; animation: slideIn 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* PROFIL & COMPTEUR */
        .profile-link { display: inline-block; margin-bottom: 10px; }
        .profile-img { 
            width: clamp(100px, 20vw, 140px); height: clamp(100px, 20vw, 140px); 
            border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow); object-fit: cover; 
        }
        h1 { font-family: 'Bebas Neue'; font-size: clamp(2.5rem, 10vw, 5.5rem); margin: 10px 0; letter-spacing: 2px; }
        #followerCount { font-family: 'Bebas Neue'; font-size: clamp(5rem, 20vw, 11rem); line-height: 0.9; filter: drop-shadow(0 0 20px var(--primary-glow)); }
        .sub-label { font-weight: 700; color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 30px; font-size: 0.9rem; letter-spacing: 5px; }

        /* CONTENU */
        .media-item { margin: 25px auto; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-align: left; }
        iframe, img, video { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; display: block; }
        .post-date { display: block; text-align: right; font-size: 0.7rem; opacity: 0.5; font-style: italic; margin-top: 10px; }
        .badge-tag { background: var(--primary); padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin-bottom: 8px; display: inline-block; }

        /* FORM */
        #emailForm { display: flex; flex-direction: column; max-width: 500px; margin: auto; gap: 12px; }
        input, textarea { padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; font-family: inherit; }
        .btn-send { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 30px; font-family: 'Bebas Neue'; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary-glow); }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <canvas id="particles"></canvas>

    <nav>
        <button onclick="showSection('rapsound')" id="btn-rapsound" class="active-btn">RapSound</button>
        <button onclick="showSection('avenir')" id="btn-avenir">À venir ⏳</button>
        <button onclick="showSection('tendances')" id="btn-tendances">Tendances 🔥</button>
        <button onclick="showSection('email')" id="btn-email">Contact 💬</button>
    </nav>

    <section id="rapsound" class="active">
        <a href="https://youtube.com/@rapsound-music" target="_blank" class="profile-link">
            <img src="https://yt3.googleusercontent.com/Uhsp5Mf-_im0rMu1DbN2jrV0lW3xPOOhDvJFtc_nlPfY3Ejvge9q1EaUi5jZb3Y5qAs68sFseA=s160-c-k-c0x00ffffff-no-rj" class="profile-img" alt="RapSound">
        </a>
        <h1>RapSound</h1>
        <div id="followerCount">0</div>
        <span class="sub-label">Abonnés</span>
        <div id="rapsoundContainer"></div>
    </section>

    <section id="avenir"><h1>À VENIR ⏳</h1><div id="avenirContainer"></div></section>
    <section id="tendances"><h1>Tendances 🔥</h1><div id="tendancesContainer"></div></section>
    
    <section id="email">
        <h1>Contact 💬</h1>
        <form id="emailForm">
            <input type="email" id="userEmail" placeholder="Ton adresse e-mail" required>
            <textarea id="userMsg" placeholder="Écris ton message ici..." rows="6" required></textarea>
            <button type="submit" class="btn-send">ENVOYER L'E-MAIL</button>
        </form>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDdanXHxyG3uT8QtGy0czSOwVrCl_G7AgQ", authDomain: "rapsound-a36a1.firebaseapp.com", projectId: "rapsound-a36a1", storageBucket: "rapsound-a36a1.firebasestorage.app", messagingSenderId: "834539128779", appId: "1:834539128779:web:1f84187e067b81fa33184e" };
        const db = getFirestore(initializeApp(firebaseConfig));

        let currentSubs = 0, confettiUntil = 0;

        // Gestion Confettis
        onSnapshot(doc(db, "stats", "confetti"), s => { if(s.exists()) confettiUntil = s.data().activeUntil; });
        const launchConfetti = () => { if (Date.now() < confettiUntil) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff1a1a', '#ffffff'] }); };

        // Animation Compteur
        function animateCounter(target) {
            const el = document.getElementById("followerCount");
            let start = null;
            const duration = 2000;
            const step = (now) => {
                if (!start) start = now;
                const progress = Math.min((now - start) / duration, 1);
                const easeOutQuad = 1 - (1 - progress) * (1 - progress);
                el.innerText = Math.floor(easeOutQuad * target);
                if (progress < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }

        onSnapshot(doc(db, "stats", "followers"), s => {
            if(s.exists()) { 
                currentSubs = s.data().count; 
                animateCounter(currentSubs); 
                launchConfetti(); 
            }
        });

        // Navigation
        window.showSection = (id) => {
            document.querySelectorAll("section, nav button").forEach(el => el.classList.remove("active", "active-btn"));
            document.getElementById(id).classList.add("active");
            document.getElementById("btn-"+id).classList.add("active-btn");
            window.scrollTo({top:0, behavior:'smooth'});
            if(id === 'rapsound') { animateCounter(currentSubs); launchConfetti(); }
        };

        // Données Firebase
        const load = (col, contId) => {
            onSnapshot(query(collection(db, col), orderBy("date", "desc")), snap => {
                const cont = document.getElementById(contId);
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    const badge = col === "avenir" ? '<span class="badge-tag">EXCLU</span>' : '';
                    let m = data.type === "youtube" ? `<iframe src="${data.url}" loading="lazy" allowfullscreen></iframe>` : 
                            data.type === "image" ? `<img src="${data.url}" loading="lazy">` : 
                            data.type === "video" ? `<video src="${data.url}" controls></video>` : "";
                    html += `<div class="media-item">${badge}${m}<p>${data.text || ""}</p>${data.heure ? `<span class="post-date">${data.heure}</span>` : ''}</div>`;
                });
                cont.innerHTML = html;
            });
        };
        ["rapsound", "tendances", "avenir"].forEach(c => load(c, c+"Container"));

        document.getElementById("emailForm").onsubmit = e => {
            e.preventDefault();
            const body = `Message de: ${document.getElementById("userEmail").value}\n\n${document.getElementById("userMsg").value}`;
            window.location.href = `mailto:rapsound-music_contact@tutamail.com?subject=Contact&body=${encodeURIComponent(body)}`;
        };
    </script>

    <script>
        // Particules fluides
        const canvas = document.getElementById("particles"), ctx = canvas.getContext("2d");
        let pts = [];
        const res = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize = res; res();
        for(let i=0; i<30; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*20+10, vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2, a: Math.random()*0.1 });
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < -20) p.x = canvas.width+20; if(p.x > canvas.width+20) p.x = -20;
                if(p.y < -20) p.y = canvas.height+20; if(p.y > canvas.height+20) p.y = -20;
                ctx.fillStyle = `rgba(255,0,0,${p.a})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
