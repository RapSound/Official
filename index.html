<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RapSound | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
      :root {
        --primary: #ff1a1a;
        --primary-glow: rgba(255, 26, 26, 0.6);
        --dark-red: #2a0000;
        --bg-black: #020000;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      /* BASE RESPONSIVE */
      body { 
        margin: 0; font-family: 'Montserrat', sans-serif; 
        background: linear-gradient(45deg, var(--bg-black), var(--dark-red), var(--bg-black));
        background-size: 400% 400%; animation: gradientMove 12s ease infinite;
        color: white; overflow-x: hidden;
      }

      @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

      #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

      /* NAVIGATION ADAPTATIVE */
      nav {
          display: flex; justify-content: center; align-items: center;
          background: rgba(0, 0, 0, 0.9); padding: 10px; gap: 8px;
          position: sticky; top: 0; z-index: 100; backdrop-filter: blur(25px);
          border-bottom: 2px solid var(--primary); flex-wrap: wrap;
      }
      nav button {
          background: transparent; border: 1px solid var(--glass-border); color: white;
          padding: 8px 15px; border-radius: 5px; cursor: pointer;
          font-family: 'Bebas Neue', cursive; font-size: 1rem; transition: 0.3s;
          white-space: nowrap;
      }
      nav button.active-btn { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); border-color: var(--primary); }

      /* SECTIONS */
      section { display: none; padding: 40px 15px; text-align: center; max-width: 850px; margin: auto; animation: slideIn 0.6s ease-out; }
      .active { display: block; }
      @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

      /* PROFIL */
      .profile-link { display: inline-block; margin-top: 10px; transition: 0.4s; }
      .profile-img {
          width: clamp(100px, 20vw, 140px); height: clamp(100px, 20vw, 140px);
          border-radius: 50%; border: 3px solid var(--primary); 
          box-shadow: 0 0 20px var(--primary-glow); object-fit: cover;
      }

      h1 { font-family: 'Bebas Neue', cursive; font-size: clamp(2.5rem, 10vw, 5.5rem); margin: 10px 0; letter-spacing: 2px; }

      #followerCount { font-family: 'Bebas Neue'; font-size: clamp(5rem, 20vw, 11rem); line-height: 0.9; filter: drop-shadow(0 0 20px var(--primary-glow)); }
      .sub-label { font-weight: 700; letter-spacing: clamp(3px, 1vw, 8px); color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 30px; font-size: 0.9rem; }

      /* CARTES DE CONTENU */
      .media-item {
          margin: 25px auto; padding: 15px; border-radius: 15px;
          background: var(--glass); border: 1px solid var(--glass-border);
          backdrop-filter: blur(15px); text-align: left;
      }
      .media-item p { margin: 12px 0; font-size: 1rem; line-height: 1.4; color: #eee; white-space: pre-wrap; }
      iframe, img, video { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; display: block; }

      .post-date { display: block; text-align: right; font-size: 0.7rem; opacity: 0.5; margin-top: 10px; font-style: italic; }
      .badge-tag { background: var(--primary); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin-bottom: 8px; display: inline-block; }

      /* FORMULAIRE CONTACT */
      #emailForm { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; margin: auto; }
      #emailForm input, #emailForm textarea {
          width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--glass-border); 
          background: rgba(0,0,0,0.3); color: white; margin-bottom: 12px; font-family: inherit;
      }
      #emailForm textarea { resize: vertical; }
      .btn-send {
          background: var(--primary); color: white; border: none; padding: 15px 50px; 
          border-radius: 30px; font-family: 'Bebas Neue'; font-size: 1.3rem; cursor: pointer; transition: 0.3s;
      }
      .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary-glow); }

      /* MOBILE AJUSTEMENTS */
      @media (max-width: 480px) {
          nav { gap: 5px; }
          nav button { padding: 6px 10px; font-size: 0.9rem; }
          section { padding: 20px 10px; }
      }
    </style>
  </head>
  <body>
    <canvas id="particles"></canvas>

    <nav>
      <button onclick="showSection('rapsound')" id="btn-rapsound" class="active-btn">RapSound</button>
      <button onclick="showSection('avenir')" id="btn-avenir">À venir ⏳</button>
      <button onclick="showSection('tendances')" id="btn-tendances">Tendances 🔥</button>
      <button onclick="showSection('email')" id="btn-email">Contact 💬</button>
    </nav>

    <section id="rapsound" class="active">
      <a href="https://youtube.com/@rapsound-music?si=Ec_ajjfA0gLNYRuy" target="_blank" class="profile-link">
        <img src="https://yt3.googleusercontent.com/Uhsp5Mf-_im0rMu1DbN2jrV0lW3xPOOhDvJFtc_nlPfY3Ejvge9q1EaUi5jZb3Y5qAs68sFseA=s160-c-k-c0x00ffffff-no-rj" class="profile-img" alt="RapSound">
      </a>
      <h1>RapSound</h1>
      <div class="counter-box">
        <span id="followerCount">0</span>
        <span class="sub-label">Abonnés</span>
      </div>
      <div id="rapsoundContainer"></div>
    </section>

    <section id="avenir">
      <h1>À VENIR ⏳</h1>
      <div id="avenirContainer"></div>
    </section>

    <section id="tendances">
      <h1>Tendances 🔥</h1>
      <div id="tendancesContainer"></div>
    </section>

    <section id="email">
      <h1>Contact 💬</h1>
      <form id="emailForm">
        <input type="email" id="userEmail" placeholder="Ton adresse e-mail" required />
        <textarea id="userMsg" placeholder="Écris ton message ici..." rows="6" required></textarea>
        <button type="submit" class="btn-send">ENVOYER L'E-MAIL</button>
      </form>
    </section>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
      import { getFirestore, collection, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

      const firebaseConfig = {
          apiKey: "AIzaSyDdanXHxyG3uT8QtGy0czSOwVrCl_G7AgQ",
          authDomain: "rapsound-a36a1.firebaseapp.com",
          projectId: "rapsound-a36a1",
          storageBucket: "rapsound-a36a1.firebasestorage.app",
          messagingSenderId: "834539128779",
          appId: "1:834539128779:web:1f84187e067b81fa33184e"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let confettiUntil = 0;
      onSnapshot(doc(db, "stats", "confetti"), (s) => { if(s.exists()) confettiUntil = s.data().activeUntil; });

      function launchConfetti() {
          if (Date.now() < confettiUntil) {
              confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff1a1a', '#ffffff'] });
          }
      }

      function animateCounter(target) {
          const el = document.getElementById("followerCount");
          let start = performance.now();
          function update(now) {
              const elapsed = now - start;
              const progress = Math.min(elapsed / 2000, 1);
              const ease = 1 - Math.pow(1 - progress, 3);
              el.innerText = Math.floor(ease * target);
              if (progress < 1) requestAnimationFrame(update);
          }
          requestAnimationFrame(update);
      }

      onSnapshot(doc(db, "stats", "followers"), (s) => {
          if(s.exists()) { animateCounter(s.data().count); launchConfetti(); }
      });

      window.showSection = (id) => {
          document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
          document.querySelectorAll("nav button").forEach(b => b.classList.remove("active-btn"));
          document.getElementById(id).classList.add("active");
          document.getElementById("btn-" + id).classList.add("active-btn");
          window.scrollTo({top:0, behavior:'smooth'});
          if(id === 'rapsound') { animateCounter(parseInt(document.getElementById("followerCount").innerText)); launchConfetti(); }
      };

      function load(col, id) {
          onSnapshot(query(collection(db, col), orderBy("date", "desc")), (snap) => {
              const container = document.getElementById(id);
              container.innerHTML = "";
              snap.forEach(d => {
                  const data = d.data();
                  const div = document.createElement("div");
                  div.className = "media-item";
                  const dateText = data.heure ? `<span class="post-date">${data.heure}</span>` : '';
                  const badge = (col === "avenir") ? '<span class="badge-tag">EXCLU</span>' : '';
                  let m = "";
                  if(data.type === "youtube") m = `<iframe src="${data.url}" allowfullscreen></iframe>`;
                  else if(data.type === "image") m = `<img src="${data.url}" loading="lazy">`;
                  else if(data.type === "video") m = `<video src="${data.url}" controls></video>`;
                  div.innerHTML = `${badge}${m}<p>${data.text || ""}</p>${dateText}`;
                  container.appendChild(div);
              });
          });
      }
      load("rapsound", "rapsoundContainer");
      load("tendances", "tendancesContainer");
      load("avenir", "avenirContainer");

      // LOGIQUE EMAIL REELLE
      document.getElementById("emailForm").onsubmit = (e) => {
          e.preventDefault();
          const email = "rapsound-music_contact@tutamail.com";
          const subject = "Contact depuis RapSound Web";
          const body = `Message de : ${document.getElementById("userEmail").value}\n\n${document.getElementById("userMsg").value}`;
          window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      };
    </script>
    <script>
      const canvas = document.getElementById("particles"), ctx = canvas.getContext("2d");
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      let particles = [];
      class P {
          constructor() { this.init(); }
          init() {
              this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
              this.size = Math.random() * 25 + 15; this.vX = (Math.random() - 0.5) * 0.3; this.vY = (Math.random() - 0.5) * 0.3; this.alpha = Math.random() * 0.12 + 0.04;
          }
          update() { this.x += this.vX; this.y += this.vY; if(this.x < -50 || this.x > canvas.width+50 || this.y < -50 || this.y > canvas.height+50) this.init(); }
          draw() { ctx.beginPath(); ctx.fillStyle = `rgba(255, 0, 0, ${this.alpha})`; ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
      }
      for(let i=0; i<30; i++) particles.push(new P());
      function anim() { ctx.clearRect(0,0,canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(anim); }
      anim();
    </script>
  </body>
</html>
