<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <title>RapSound | Official Studio </title>

    <meta name="description" content="RapSound Official : Site Officiel de la chaîne YouTube RapSound_music !">
    <meta name="keywords" content="RapSound, Rap, Studio, Musique, Exclu, Tendances, Freestyle, Beatmaker, Official RapSound, rapsound, RapSound officiel, rapsound rap français, rap français, rap fr, musique rap française, paroles rap français, lyrics rap fr, karaoké rap français, rap karaoke fr, blind test rap français, quiz rap fr, hits rap français, classiques rap français, rap français populaire, rap français tendance, rap français youtube, chaîne rap français, contenu rap français, rap français instrumental, beats rap français, découverte rap français">
    <meta name="author" content="RapSound">

    <meta property="og:title" content="RapSound | Official">
    <meta property="og:description" content="Le futur du rap se passe ici. Écoute les exclusivités en premier.">
    <meta property="og:url" content="https://rapsound.github.io/Official/">
    <meta property="og:image" content="https://rapsound.github.io/Official/favicon.png"> 
    <meta property="og:type" content="website">
    
    <title>RapSound | Official </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #ff1a1a;
            --primary-glow: rgba(255, 26, 26, 0.6);
            --dark-red: #2a0000;
            --bg-black: #020000;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; color: white; background: var(--bg-black); overflow-x: hidden;
        }

        /* FOND ANIMÉ */
        .bg-layer {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(45deg, var(--bg-black), var(--dark-red), var(--bg-black));
            background-size: 400% 400%; animation: grad 12s ease infinite;
        }
        @keyframes grad { 0%, 100% { background-position: 0% 50% } 50% { background-position: 100% 50% } }
        #particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* NAVIGATION */
        nav { 
            display: flex; justify-content: center; gap: 8px; padding: 10px; position: sticky; top: 0; 
            z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--primary); flex-wrap: wrap;
        }
        nav button { 
            background: none; border: 1px solid var(--glass-border); color: #fff; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1rem; transition: 0.3s; 
        }
        nav button.active-btn { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); border-color: var(--primary); }
        #nav-admin { display: none; background: #900; }

        /* SECTIONS */
        section { display: none; padding: 40px 15px; text-align: center; max-width: 850px; margin: auto; }
        section.active { display: block; animation: slideIn 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CONTENU & MEDIA */
        .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow); object-fit: cover; }
        h1 { font-family: 'Bebas Neue'; font-size: clamp(2.5rem, 10vw, 5.5rem); margin: 10px 0; }
        #followerCount { font-family: 'Bebas Neue'; font-size: clamp(5rem, 20vw, 11rem); line-height: 0.9; filter: drop-shadow(0 0 20px var(--primary-glow)); }
        .sub-label { font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 5px; font-size: 0.9rem; }

        .media-item { 
            margin: 25px auto; padding: 15px; border-radius: 15px; background: var(--glass); 
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px); text-align: left; position: relative;
        }
        .media-item iframe, .media-item img, .media-item video { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; }
        .media-item p { white-space: pre-wrap; margin: 12px 0; }
        .post-date { display: block; text-align: right; font-size: 0.7rem; opacity: 0.5; font-style: italic; }

        /* Style du lecteur audio natif */
        .media-item audio {
            width: 100%; height: 45px; margin-top: 10px;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
        }
        .audio-container {
            background: rgba(255, 26, 26, 0.1); padding: 15px; border-radius: 10px; border: 1px solid var(--primary);
        }

        /* Badge Dynamique */
        .badge-tag { 
            background: var(--primary); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; 
            font-weight: bold; position: absolute; top: 10px; left: 10px; z-index: 5; text-transform: uppercase;
        }

        /* FORMULAIRES */
        input, textarea, select { 
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.5); color: #fff; font-family: inherit; margin-bottom: 10px; box-sizing: border-box;
        }
        .btn-send { background: var(--primary); color: #fff; border: none; padding: 15px 40px; border-radius: 30px; font-family: 'Bebas Neue'; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary-glow); }
        .btn-delete { background: #500; font-size: 0.8rem; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; color: white; margin-top: 10px; }

        /* ADMIN DASHBOARD */
        #admin-dashboard { text-align: left; }
        .admin-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--primary); }
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <canvas id="particles"></canvas>

    <nav id="main-nav">
        <button onclick="showSection('rapsound')" id="btn-rapsound" class="active-btn">RapSound</button>
        <button onclick="showSection('avenir')" id="btn-avenir">À venir ⏳</button>
        <button onclick="showSection('tendances')" id="btn-tendances">Tendances 🔥</button>
        <button onclick="showSection('email')" id="btn-email">Contact 💬</button>
        <button onclick="showSection('admin-dashboard')" id="btn-admin-dashboard" style="display:none; border-color: yellow;">STUDIO 🛠️</button>
    </nav>

    <section id="rapsound" class="active">
        <a href="https://youtube.com/@rapsound-music" target="_blank" class="profile-link">
            <img src="https://yt3.googleusercontent.com/Uhsp5Mf-_im0rMu1DbN2jrV0lW3xPOOhDvJFtc_nlPfY3Ejvge9q1EaUi5jZb3Y5qAs68sFseA=s160-c-k-c0x00ffffff-no-rj" class="profile-img" alt="RapSound">
        </a>
        <h1>RapSound</h1>
        <div id="followerCount">0</div>
        <span class="sub-label">Abonnés</span>
        <div id="rapsoundContainer"></div>
    </section>

    <section id="avenir">
        <h1>À VENIR ⏳</h1>
        <div id="avenirContainer"></div>
    </section>

    <section id="tendances">
        <h1>Tendances 🔥</h1>
        <div id="tendancesContainer"></div>
    </section>

    <section id="email">
        <h1>Contact 💬</h1>
        <form id="emailForm">
            <input type="text" id="userEmail" placeholder="Ton adresse e-mail" required>
            <textarea id="userMsg" placeholder="Écris ton message ici..." rows="6"></textarea>
            <button type="submit" class="btn-send">ENVOYER L'E-MAIL</button>
        </form>
    </section>

    <section id="admin-login">
        <h1>Accès Studio 🔒</h1>
        <form id="loginForm">
            <input type="email" id="loginUser" placeholder="Email Administrateur" required>
            <input type="password" id="loginPass" placeholder="Mot de passe" required>
            <button type="submit" class="btn-send">S'AUTHENTIFIER</button>
        </form>
    </section>

    <section id="admin-dashboard">
        <h1>RapSound Studio 🛠️</h1>
        
        <div class="admin-card">
            <h3>Statistiques & Effets</h3>
            <div class="flex-row">
                <div>
                    <label>Abonnés :</label>
                    <input type="number" id="inputFollowers" style="width: 100px;">
                </div>
                <div>
                    <label>Vitesse Animation (ms) :</label>
                    <input type="number" id="inputSpeed" value="2000" style="width: 100px;">
                </div>
                <button class="btn-send" onclick="updateStats()" style="padding: 10px;">OK</button>
            </div>
            <hr style="opacity: 0.1; margin: 15px 0;">
            <div class="flex-row">
                <label>Confettis 🎉 pendant (heures) :</label>
                <input type="number" id="confettiHours" value="1" style="width: 80px;">
                <button class="btn-send" onclick="triggerConfettiAdmin()" style="padding: 10px; background: orange;">Confettis 🎉</button>
            </div>
        </div>

        <div class="admin-card">
            <h3>Publier un nouveau contenu</h3>
            <select id="postDest">
                <option value="rapsound">Section RapSound</option>
                <option value="avenir">Section À Venir</option>
                <option value="tendances">Section Tendances</option>
            </select>
            <select id="postType" onchange="toggleInputType()">
                <option value="image">Image 🗺</option>
                <option value="video">Vidéo 🎞</option>
                <option value="audio">Audio 🔊</option>
                <option value="youtube">Lien YouTube 🔗</option>
                <option value="text">Texte uniquement 💬</option>
            </select>

            <input type="file" id="fileInput" accept="image/*,video/*,audio/*">
            <input type="text" id="urlInput" placeholder="URL YouTube ou Lien Direct" style="display:none;">
            
            <textarea id="postText" placeholder="Légende du post..."></textarea>
            
            <input type="text" id="postBadge" placeholder="Badge">
            <input type="text" id="postDate" placeholder="Date/Heure d'envoi ">
            
            <div id="uploadProgressCont" style="display:none; width:100%; background: #222; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden;">
                <div id="uploadProgressBar" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s;"></div>
            </div>

            <button class="btn-send" id="btnUpload" onclick="publishPost()">PUBLIER MAINTENANT</button>
        </div>

        <div class="admin-card">
            <h3>Posts existants dans cette section</h3>
            <div id="adminPostList" style="max-height: 400px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px;">
            </div>
        </div>

        <button class="btn-send" onclick="logout()" style="background: #333; margin-top: 20px;">DÉCONNEXION</button>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, addDoc, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDdanXHxyG3uT8QtGy0czSOwVrCl_G7AgQ", 
            authDomain: "rapsound-a36a1.firebaseapp.com", 
            projectId: "rapsound-a36a1", 
            storageBucket: "rapsound-a36a1.firebasestorage.app", 
            messagingSenderId: "834539128779", 
            appId: "1:834539128779:web:1f84187e067b81fa33184e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentSubs = 0, animSpeed = 2000, confettiUntil = 0;
        let editingPostId = null; 
        let currentAdminPosts = []; 

        window.showSection = (id) => {
            document.querySelectorAll("section, nav button").forEach(el => el.classList.remove("active", "active-btn"));
            document.getElementById(id).classList.add("active");
            const btn = document.getElementById("btn-" + id);
            if(btn) btn.classList.add("active-btn");
            window.scrollTo({top:0, behavior:'smooth'});
            if(id === 'rapsound') animateCounter(currentSubs);
        };

        function animateCounter(target) {
            const el = document.getElementById("followerCount");
            let start = null;
            const step = (now) => {
                if (!start) start = now;
                const progress = Math.min((now - start) / animSpeed, 1);
                el.innerText = Math.floor(progress * target);
                if (progress < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }

        onSnapshot(doc(db, "stats", "followers"), s => {
            if(s.exists()){
                currentSubs = s.data().count;
                animSpeed = s.data().speed || 2000;
                animateCounter(currentSubs);
            }
        });

        onSnapshot(doc(db, "stats", "confetti"), s => {
            if(s.exists()){
                confettiUntil = s.data().activeUntil;
                if(Date.now() < confettiUntil) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff1a1a', '#ffffff'] });
            }
        });

        const load = (col, contId) => {
            onSnapshot(query(collection(db, col), orderBy("date", "desc")), snap => {
                const cont = document.getElementById(contId);
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    
                    // MODIFICATION BADGE DYNAMIQUE
                    const badgeText = data.badge || ""; 
                    const badge = badgeText ? `<span class="badge-tag">${badgeText}</span>` : '';
                    
                    let m = "";
                    if(data.type === "youtube") {
                        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;
                        const match = data.url.match(regExp);
                        const videoId = (match && match[2].length === 11) ? match[2] : null;
                        m = videoId ? `<iframe src="https://www.youtube.com/embed/${videoId}" loading="lazy" allowfullscreen></iframe>` : `<p>⚠️ Lien YouTube invalide</p>`;
                    } else if(data.type === "image") m = `<img src="${data.url}" loading="lazy">`;
                    else if(data.type === "video") m = `<video src="${data.url}" controls></video>`;
                    else if(data.type === "audio") {
                        m = `<div class="audio-container"><audio src="${data.url}" controls controlsList="nodownload"></audio></div>`;
                    }
                    
                    const adminTools = auth.currentUser ? `<button class="btn-delete" onclick="window.deletePost('${col}', '${id}')">Supprimer X</button>` : "";
                    html += `<div class="media-item">${badge}${m}<p>${data.text || ""}</p><span class="post-date">${data.heure || ""}</span>${adminTools}</div>`;
                });
                cont.innerHTML = html;
            });
        };
        ["rapsound", "tendances", "avenir"].forEach(c => load(c, c+"Container"));

        document.getElementById("emailForm").onsubmit = e => {
            e.preventDefault();
            const email = document.getElementById("userEmail").value;
            const msg = document.getElementById("userMsg").value;
            if(email === "AdministrateurRapSound-music" && msg.trim() === "") showSection('admin-login');
            else window.location.href = `mailto:rapsound-music_contact@tutamail.com?subject=Contact&body=${encodeURIComponent(msg)}`;
        };

        document.getElementById("loginForm").onsubmit = e => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById("loginUser").value, document.getElementById("loginPass").value)
                .then(() => showSection('admin-dashboard'))
                .catch(err => alert("Erreur : " + err.message));
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        const refreshAdminList = () => {
            const col = document.getElementById("postDest").value;
            const listCont = document.getElementById("adminPostList");

            onSnapshot(query(collection(db, col), orderBy("date", "desc")), snap => {
                listCont.innerHTML = "";
                currentAdminPosts = []; 
                snap.forEach(d => currentAdminPosts.push({ id: d.id, ...d.data() }));

                currentAdminPosts.forEach((data, index) => {
                    const item = document.createElement("div");
                    item.style = "display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 8px; border-left: 3px solid var(--primary);";
                    
                    let thumb = `<div style="width:40px; height:40px; background:#222; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">📝</div>`;
                    
                    if(data.type === 'youtube') {
                        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;
                        const match = data.url.match(regExp);
                        const videoId = (match && match[2].length === 11) ? match[2] : null;
                        const imgUrl = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : "";
                        thumb = `<img src="${imgUrl}" style="width:40px; height:40px; object-fit:cover; border-radius:5px;">`;
                    } else if(data.type === 'image') {
                        thumb = `<img src="${data.url}" style="width:40px; height:40px; object-fit:cover; border-radius:5px;">`;
                    } else if(data.type === 'audio') {
                        thumb = `<div style="width:40px; height:40px; background:var(--primary); border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">🎵</div>`;
                    }

                    const btnUp = index > 0 ? `<button onclick="window.movePost('${col}', ${index}, -1)" style="background:#444; border:none; color:white; padding:2px 8px; cursor:pointer; border-radius:3px;">▲</button>` : `<div style="width:25px;"></div>`;
                    const btnDown = index < currentAdminPosts.length - 1 ? `<button onclick="window.movePost('${col}', ${index}, 1)" style="background:#444; border:none; color:white; padding:2px 8px; cursor:pointer; border-radius:3px;">▼</button>` : `<div style="width:25px;"></div>`;

                    item.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:4px; margin-right:5px;">${btnUp}${btnDown}</div>
                        ${thumb}
                        <div style="flex:1; overflow: hidden;">
                            <strong style="font-size: 0.8rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${data.text || "(Sans texte)"}</strong>
                            <span style="font-size: 0.7rem; opacity: 0.5;">${data.heure || ""}</span>
                        </div>
                        <button onclick="window.editPost('${col}', '${data.id}')" style="background:none; border:1px solid #aaa; color:white; padding:5px; border-radius:4px; cursor:pointer;">✏️</button>
                        <button onclick="window.deletePost('${col}', '${data.id}')" style="background:none; border:1px solid red; color:red; padding:5px; border-radius:4px; cursor:pointer;">X</button>
                    `;
                    listCont.appendChild(item);
                });
            });
        };

        window.movePost = async (col, currentIndex, direction) => {
            const targetIndex = currentIndex + direction;
            if (targetIndex < 0 || targetIndex >= currentAdminPosts.length) return;
            const currentDoc = currentAdminPosts[currentIndex];
            const targetDoc = currentAdminPosts[targetIndex];
            const tempDate = currentDoc.date;
            await updateDoc(doc(db, col, currentDoc.id), { date: targetDoc.date });
            await updateDoc(doc(db, col, targetDoc.id), { date: tempDate });
        };

        document.getElementById("postDest").addEventListener("change", refreshAdminList);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById("btn-admin-dashboard").style.display = "block";
                refreshAdminList();
            }
        });

        window.editPost = async (col, id) => {
            editingPostId = id;
            const docRef = doc(db, col, id);
            const snap = await getDoc(docRef);
            if(snap.exists()) {
                const data = snap.data();
                document.getElementById("postType").value = data.type;
                document.getElementById("postText").value = data.text || "";
                document.getElementById("postDate").value = data.heure || "";
                document.getElementById("postBadge").value = data.badge || ""; // AJOUTÉ ICI
                
                if(data.type === 'youtube') document.getElementById("urlInput").value = data.url;
                window.toggleInputType();
                document.getElementById("btnUpload").innerText = "METTRE À JOUR LE POST";
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        };

        window.toggleInputType = () => {
            const type = document.getElementById("postType").value;
            document.getElementById("fileInput").style.display = (type === 'image' || type === 'video' || type === 'audio') ? 'block' : 'none';
            document.getElementById("urlInput").style.display = (type === 'youtube') ? 'block' : 'none';
        };

        window.updateStats = async () => {
            const count = parseInt(document.getElementById("inputFollowers").value);
            const speed = parseInt(document.getElementById("inputSpeed").value);
            await setDoc(doc(db, "stats", "followers"), { count, speed });
            alert("Stats mises à jour !");
        };

        window.triggerConfettiAdmin = async () => {
            const hours = parseFloat(document.getElementById("confettiHours").value);
            const until = Date.now() + (hours * 3600000);
            await setDoc(doc(db, "stats", "confetti"), { activeUntil: until });
            alert("La fête est lancée !");
        };

        window.deletePost = async (col, id) => {
            if(confirm("Supprimer ce post ?")) await deleteDoc(doc(db, col, id));
        };

        window.publishPost = async () => {
            const btn = document.getElementById("btnUpload");
            const progCont = document.getElementById("uploadProgressCont");
            const progBar = document.getElementById("uploadProgressBar");
            const type = document.getElementById("postType").value;
            const col = document.getElementById("postDest").value;
            const text = document.getElementById("postText").value;
            const dateStr = document.getElementById("postDate").value;
            const badgeValue = document.getElementById("postBadge").value; // AJOUTÉ ICI
            let finalUrl = document.getElementById("urlInput").value;

            btn.disabled = true;
            btn.innerText = "PATIENTE...";

            try {
                const file = document.getElementById("fileInput").files[0];
                if (file && (type === 'image' || type === 'video' || type === 'audio')) {
                    progCont.style.display = "block";
                    progBar.style.width = "0%";
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", "RapSoundWeb");

                    finalUrl = await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open("POST", "https://api.cloudinary.com/v1_1/dpzhcg6sp/upload");
                        xhr.upload.onprogress = (e) => {
                            if (e.lengthComputable) {
                                const percent = Math.round((e.loaded / e.total) * 100);
                                progBar.style.width = percent + "%";
                                btn.innerText = `CHARGEMENT : ${percent}%`;
                            }
                        };
                        xhr.onload = () => {
                            const res = JSON.parse(xhr.responseText);
                            if (res.secure_url) resolve(res.secure_url);
                            else reject(new Error(res.error.message));
                        };
                        xhr.onerror = () => reject(new Error("Échec du transfert réseau"));
                        xhr.send(formData);
                    });
                }

                const postData = { 
                    type, 
                    url: finalUrl || "", 
                    text, 
                    heure: dateStr, 
                    badge: badgeValue, // AJOUTÉ ICI
                    date: Date.now(), 
                    position: 0 
                };

                if(editingPostId) {
                    await updateDoc(doc(db, col, editingPostId), postData);
                    alert("Mis à jour ! ✅");
                    editingPostId = null;
                } else {
                    await addDoc(collection(db, col), postData);
                    alert("Publié ! 🚀");
                }

                // RESET
                document.getElementById("postText").value = "";
                document.getElementById("fileInput").value = "";
                document.getElementById("postBadge").value = ""; // AJOUTÉ ICI
                progCont.style.display = "none";
                btn.innerText = "PUBLIER MAINTENANT";
            } catch (e) {
                alert("⚠️ " + e.message);
                progCont.style.display = "none";
            } finally {
                btn.disabled = false;
            }
        };
    </script>

    <script>
        const canvas = document.getElementById("particles"), ctx = canvas.getContext("2d");
        let pts = [];
        const res = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize = res; res();
        for(let i=0; i<30; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*20+10, vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2, a: Math.random()*0.1 });
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < -20) p.x = canvas.width+20; if(p.x > canvas.width+20) p.x = -20;
                if(p.y < -20) p.y = canvas.height+20; if(p.y > canvas.height+20) p.y = -20;
                ctx.fillStyle = `rgba(255,0,0,${p.a})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
